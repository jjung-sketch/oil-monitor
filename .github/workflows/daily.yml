name: 매일 유가 업데이트

on:
  schedule:
    - cron: '0 0 * * 1-5'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 패키지 설치
        run: pip install yfinance plotly pandas

      - name: 유가 데이터 수집 및 HTML 생성
        run: python oil_monitor.py
        env:
          OPINET_KEY: ${{ secrets.OPINET_KEY }}

      - name: index.html 커밋 & 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "유가 업데이트 $(date +%Y-%m-%d)"
          git push
